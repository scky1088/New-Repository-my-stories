<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國演義故事館 - 數位閱讀區</title>
    <style>
        :root {
            --ancient-red: #8e2121;
            --ancient-gold: #c5a059;
            --paper-bg: #fcf8f0;
            --ink-black: #2c2c2c;
        }
        body { 
            font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft JhengHei', serif; 
            background-color: var(--paper-bg); 
            background-image: radial-gradient(#e5ddd3 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; 
            color: var(--ink-black);
        }
        header { 
            background: var(--ancient-red); 
            color: #fff; 
            text-align: center; 
            padding: 50px 20px; 
            border-bottom: 5px solid var(--ancient-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        header h1 { margin: 0; font-size: 3rem; letter-spacing: 10px; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
        header p { margin-top: 15px; font-size: 1.2rem; opacity: 0.9; font-style: italic; }
        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
            padding: 0 20px;
        }
        .card { 
            background: white; 
            border: 1px solid #dcd3c1; 
            border-radius: 4px; 
            position: relative;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(142, 33, 33, 0.2); }
        .card-img-container {
            width: 100%; height: 220px; background: #fdfaf2; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 3px solid var(--ancient-gold);
        }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 25px; text-align: center; flex-grow: 1; }
        .card-body h3 { 
            margin: 0 0 20px 0; color: var(--ancient-red); font-size: 1.35rem; 
            height: 2.5em; display: flex; align-items: center; justify-content: center;
            letter-spacing: 2px;
        }
        .read-btn { 
            display: inline-block; background: var(--ancient-red); color: white; 
            padding: 12px 35px; text-decoration: none; font-weight: bold; 
            border-radius: 2px; letter-spacing: 4px;
        }
        .chapter-tag {
            position: absolute; top: 0; right: 20px; background: var(--ancient-red);
            color: white; padding: 10px 5px; font-size: 13px; z-index: 10;
            writing-mode: vertical-rl; letter-spacing: 3px;
        }
    </style>
</head>
<body>

<header>
    <h1>📜 三國演義故事館</h1>
    <p>「亂世英雄出輩才，經典篇章展宏圖」</p>
</header>

<div class="container">
    <a href="PDF/1.pdf" target="_blank" class="card">
        <span class="chapter-tag">桃園結義</span>
        <div class="card-img-container"><img src="img/1.jpg"></div>
        <div class="card-body"><h3>第一回 桃園三結義</h3><span class="read-btn">開啟捲軸</span></div>
    </a>

    <a href="PDF/2.pdf" target="_blank" class="card">
        <span class="chapter-tag">三英戰呂布</span>
        <div class="card-img-container"><img src="img/2.png"></div>
        <div class="card-body"><h3>第三回 三英戰呂布</h3><span class="read-btn">開啟捲軸</span></div>
    </a>

    <a href="PDF/3.pdf" target="_blank" class="card">
        <span class="chapter-tag">曹操獻刀</span>
        <div class="card-img-container"><img src="img/3.jpg"></div>
        <div class="card-body"><h3>第四回 謀董卓 曹操獻刀</h3><span class="read-btn">開啟捲軸</span></div>
    </a>

    <a href="PDF/4.pdf" target="_blank" class="card">
        <span class="chapter-tag">長坂坡</span>
        <div class="card-img-container"><img src="img/4.jpg"></div>
        <div class="card-body"><h3>趙子龍單騎救主</h3><span class="read-btn">開啟捲軸</span></div>
    </a>

    <a href="PDF/5.pdf" target="_blank" class="card">
        <span class="chapter-tag">赤壁之戰</span>
        <div class="card-img-container"><img src="img/5.jpg"></div>
        <div class="card-body"><h3>火燒赤壁 曹軍大敗</h3><span class="read-btn">開啟捲軸</span></div>
    </a>

    <a href="PDF/6.pdf" target="_blank" class="card">
        <span class="chapter-tag">刮骨療毒</span>
        <div class="card-img-container"><img src="img/6.jpg"></div>
        <div class="card-body"><h3>關雲長刮骨療毒</h3><span class="read-btn">開啟捲軸</span></div>
    </a>
</div>

<footer><p style="text-align:center; padding:40px; color:#777;">數位文學教室 · 讓經典伴隨成長</p></footer>

</body>
</html>
