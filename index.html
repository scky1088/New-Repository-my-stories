<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國演義故事館 - 學生閱讀區</title>
    <style>
        :root {
            --ancient-red: #8e2121;
            --ancient-gold: #c5a059;
            --paper-bg: #fcf8f0;
        }

        body { 
            font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft JhengHei', serif; 
            background-color: var(--paper-bg); 
            background-image: radial-gradient(#e5ddd3 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; 
            color: #333;
            line-height: 1.6;
        }

        header { 
            background: var(--ancient-red); 
            color: #fff; 
            text-align: center; 
            padding: 60px 20px; 
            border-bottom: 5px solid var(--ancient-gold);
        }

        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { margin-top: 15px; font-size: 1.1rem; opacity: 0.9; }

        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 0 20px;
        }

        .card { 
            background: white; 
            border: 1px solid #dcd3c1; 
            border-radius: 8px; 
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--ancient-gold);
        }

        .card-header {
            background: #f9f4e8;
            padding: 30px;
            text-align: center;
            font-size: 50px;
            border-bottom: 1px dashed #dcd3c1;
            border-radius: 8px 8px 0 0;
        }

        .card-body { padding: 25px; text-align: center; flex-grow: 1; }
        
        .card-body h3 { 
            margin: 0 0 20px 0; 
            color: var(--ancient-red); 
            font-size: 1.25rem; 
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .read-btn { 
            display: inline-block; 
            background: var(--ancient-red); 
            color: white; 
            padding: 10px 30px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 4px;
            transition: 0.2s;
        }

        .chapter-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--ancient-gold);
            color: white;
            padding: 2px 12px;
            font-size: 12px;
            border-radius: 20px;
            z-index: 10;
        }

        footer { text-align: center; padding: 60px 20px; color: #888; border-top: 1px solid #e0e0e0; margin-top: 40px; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

<header>
    <h1>📜 三國演義故事館</h1>
    <p>「滾滾長江東逝水，浪花淘盡英雄」—— 經典篇章選讀</p>
</header>

<div class="container">
    
    <a href="PDF/1.pdf" target="_blank" class="card">

        <div class="card-body">
            <h3>《三國演義》第一回 桃園結義</h3>
            <span class="read-btn">開啟捲軸</span>
        </div>
    </a>

    <a href="PDF/2.pdf" target="_blank" class="card">
        <span class="chapter-tag">第三回</span>
        <div class="card-header">🐎</div>
        <div class="card-body">
            <h3>《三國演義》第三回 三英戰呂布</h3>
            <span class="read-btn">開啟捲軸</span>
        </div>
    </a>
