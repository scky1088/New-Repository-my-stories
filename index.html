<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國演義故事館 - 數位閱讀區</title>
    <style>
        :root {
            --ancient-red: #8e2121;
            --ancient-gold: #c5a059;
            --paper-bg: #fcf8f0;
            --ink-black: #2c2c2c;
        }

        body { 
            font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft JhengHei', serif; 
            background-color: var(--paper-bg); 
            background-image: radial-gradient(#e5ddd3 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; 
            color: var(--ink-black);
            line-height: 1.6;
        }

        header { 
            background: var(--ancient-red); 
            color: #fff; 
            text-align: center; 
            padding: 50px 20px; 
            border-bottom: 5px solid var(--ancient-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header h1 { margin: 0; font-size: 3rem; letter-spacing: 10px; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); }
        header p { margin-top: 15px; font-size: 1.2rem; opacity: 0.9; font-style: italic; letter-spacing: 2px; }

        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
            padding: 0 20px;
        }

        .card { 
            background: white; 
            border: 1px solid #dcd3c1; 
            border-radius: 4px; 
            position: relative;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }

        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 20px 40px rgba(142, 33, 33, 0.2);
            border-color: var(--ancient-red);
        }

        /* 人物立繪容器 */
        .card-img-container {
            width: 100%;
            height: 220px;
            background: #fdfaf2;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--ancient-gold);
        }

        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover .card-img-container img {
            transform: scale(1.1);
        }

        .card-body { padding: 25px; text-align: center; flex-grow: 1; }
        
        .card-body h3 { 
            margin: 0 0 20px 0; 
            color: var(--ancient-red); 
            font-size: 1.3rem; 
            height: 2.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
            letter-spacing: 1px;
        }

        .read-btn { 
            display: inline-block; 
            background: var(--ancient-red); 
            color: white; 
            padding: 12px 35px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 2px;
            letter-spacing: 4px;
            transition: 0.3s;
        }

        .card:hover .read-btn {
            background: #b03030;
            box-shadow: 0 4px 10px rgba(176, 48, 48, 0.3);
        }

        /* 古風垂直標籤 */
        .chapter-tag {
            position: absolute;
            top: 0;
            right: 20px;
            background: var(--ancient-red);
            color: white;
            padding: 10px 5px;
            font-size: 13px;
            z-index: 10;
            writing-mode: vertical-rl;
            letter-spacing: 3px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }

        footer { text-align: center; padding: 60px 20px; color: #777; border-top: 1px solid #dcd3c1; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>📜 三國演義故事館</h1>
    <p>「亂世英雄出輩才，經典篇章展宏圖」</p>
</header>

<div class="container">
    
    <a href="PDF/1.pdf" target="_blank" class="card">
        <span class="chapter-tag">桃園結義</span>
        <div class="card-img-container">
            <img src="img/1.jpg" alt="第一回">
        </div>
        <div class="card-body">
            <h3>第一回 桃園三結義</h3>
            <span class="read-btn">開啟捲軸</span>
        </div>
    </a>

    <a href="PDF/2.pdf" target="_blank" class="card">
        <span class="chapter-tag">三英戰呂布</span>
        <div class="card-img-container">
            <img src="img/2.png" alt="第三回">
        </div>
