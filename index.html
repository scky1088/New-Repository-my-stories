<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三國演義故事館 - 學生閱讀區</title>
    <style>
        :root {
            --ancient-red: #8e2121;
            --ancient-gold: #c5a059;
            --paper-bg: #fcf8f0;
        }

        body { 
            font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft JhengHei', serif; 
            background-color: var(--paper-bg); 
            background-image: radial-gradient(#e5ddd3 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; 
            color: #333;
            line-height: 1.6;
        }

        header { 
            background: var(--ancient-red); 
            color: #fff; 
            text-align: center; 
            padding: 60px 20px; 
            border-bottom: 5px solid var(--ancient-gold);
        }

        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { margin-top: 15px; font-size: 1.1rem; opacity: 0.9; }

        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 0 20px;
        }

        .card { 
            background: white; 
            border: 1px solid #dcd3c1; 
            border-radius: 8px; 
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--ancient-gold);
        }

        .card-header {
            background: #f9f4e8;
            padding: 30px;
            text-align: center;
            font-size: 50px;
            border-bottom: 1px dashed #dcd3c1;
            border-radius: 8px 8px 0 0;
        }
